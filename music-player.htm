<!DOCTYPE html>
<html lang="id">
<head>

<title>Tekhim's Mp3 Player • Multi Neon</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff00ff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #010314;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Outfit', system-ui, sans-serif;
      padding: 16px;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 255, 100, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 0, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 30% 70%, rgba(155, 0, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 60%);
    }

    .player {
      width: 100%;
      max-width: 420px;
      background: rgba(5, 10, 28, 0.78);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border-radius: 56px;
      padding: 24px 20px 30px;
      box-shadow: 
        0 40px 60px rgba(0, 0, 0, 0.85),
        0 0 0 1.5px rgba(255, 0, 255, 0.3),
        0 0 0 3px rgba(0, 255, 100, 0.15),
        0 0 50px rgba(255, 0, 255, 0.3),
        0 0 80px rgba(0, 200, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .player::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        from 0deg, 
        transparent, 
        rgba(255, 0, 255, 0.04), 
        transparent, 
        rgba(0, 255, 100, 0.05), 
        transparent,
        rgba(155, 0, 255, 0.04),
        transparent,
        rgba(0, 255, 255, 0.04),
        transparent,
        rgba(255, 215, 0, 0.03),
        transparent
      );
      animation: rotateBg 18s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .player > * {
      position: relative;
      z-index: 2;
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
    }

    .player-title {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff00ff, #00ff88, #00e0ff, #9b00ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleShine 4s ease-in-out infinite;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes titleShine {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
    }

    .player-title i {
      background: none;
      -webkit-text-fill-color: #ff00ff;
      filter: drop-shadow(0 0 12px #ff00ff);
      font-size: 1.8rem;
    }

    .badge {
      background: rgba(255, 0, 255, 0.1);
      border-radius: 40px;
      padding: 5px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #ffb3ff;
      border: 1px solid rgba(255, 0, 255, 0.5);
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
    }

    .cover-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 5px 0;
    }

    .cover-art {
      width: 170px;
      height: 170px;
      border-radius: 40px;
      background: linear-gradient(145deg, #1a0a2a, #0a0515);
      box-shadow: 
        0 25px 40px rgba(0, 0, 0, 0.8),
        0 0 35px rgba(255, 0, 255, 0.5),
        0 0 55px rgba(155, 0, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      color: rgba(255, 0, 255, 0.7);
      border: 2px solid rgba(255, 0, 255, 0.5);
      background-size: cover;
      background-position: center;
      z-index: 5;
      transition: all 0.3s ease;
    }

    .cover-container::before {
      content: "";
      position: absolute;
      width: 195px;
      height: 195px;
      border-radius: 50%;
      background: conic-gradient(from 90deg, #ff00ff, #00ff88, #00ffff, #9b00ff, #ffd700, #ff00ff);
      opacity: 0.35;
      filter: blur(30px);
      z-index: 1;
      animation: rotateGlow 5s infinite linear;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .song-info {
      text-align: center;
    }

    .song-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0e6ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
    }

    .song-artist {
      font-size: 0.8rem;
      color: #c0a0ff;
      margin-top: 3px;
    }

    .progress-area {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c8b8ff;
      font-size: 0.7rem;
      margin: 4px 0;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff00ff, #9b00ff, #00ff88, #00ffff);
      border-radius: 10px;
      box-shadow: 0 0 18px #ff00ff, 0 0 28px #9b00ff;
      transition: width 0.1s linear;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin: 8px 0;
    }

    .ctrl-btn {
      position: relative;
      background: rgba(10, 20, 40, 0.5);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: #e0d0ff;
      font-size: 1.2rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    .ctrl-btn::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 0, 255, 0.6), transparent 70%);
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s ease;
    }

    .ctrl-btn:active::after {
      opacity: 1;
      transform: scale(1.8);
      transition: all 0.15s ease;
    }

    .ctrl-btn:active {
      transform: scale(0.85);
      border-color: #ff00ff;
      box-shadow: 0 0 25px #ff00ff, 0 0 40px #00ffff, 0 0 15px #ffd700;
    }

    .play-btn {
      width: 72px;
      height: 72px;
      font-size: 1.8rem;
      background: radial-gradient(circle at 30% 30%, #4a1050, #1a0020);
      border: 2px solid rgba(255, 0, 255, 0.8);
      box-shadow: 0 0 35px #ff00ff, 0 0 55px #ff00cc, 0 0 25px #ff66ff;
      animation: playPulseMagenta 2s ease-in-out infinite;
    }

    @keyframes playPulseMagenta {
      0%, 100% { 
        box-shadow: 0 0 35px #ff00ff, 0 0 55px #ff00cc, 0 0 25px #ff66ff;
        border-color: rgba(255, 0, 255, 0.8);
      }
      50% { 
        box-shadow: 0 0 50px #ff00ff, 0 0 80px #ff00cc, 0 0 45px #ff66ff, 0 0 20px #ff99ff;
        border-color: rgba(255, 50, 255, 1);
      }
    }

    .play-btn:active {
      animation: none;
      transform: scale(0.9);
      box-shadow: 0 0 70px #ff00ff, 0 0 100px #ff00cc, 0 0 60px #ff66ff, 0 0 30px #ff99ff;
      border-color: #ff33ff;
    }

    #prevBtn {
      border-color: rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }

    #nextBtn {
      border-color: rgba(255, 215, 0, 0.5);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    .volume-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(10, 25, 15, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 8px 16px;
      border: 1px solid rgba(0, 255, 136, 0.4);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
      transition: all 0.3s ease;
    }

    .volume-icon {
      color: #00ff88;
      font-size: 1rem;
      filter: drop-shadow(0 0 8px #00ff88) drop-shadow(0 0 15px #00ff66);
      animation: volumeGlow 2s ease-in-out infinite;
    }

    @keyframes volumeGlow {
      0%, 100% { filter: drop-shadow(0 0 8px #00ff88) drop-shadow(0 0 15px #00ff66); }
      50% { filter: drop-shadow(0 0 15px #00ff88) drop-shadow(0 0 25px #00ff66) drop-shadow(0 0 35px #00ffaa); }
    }

    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      background: linear-gradient(90deg, #00ff66, #00ff88, #00ffaa);
      border-radius: 5px;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 20px #00ff88, 0 0 35px #00ff66, 0 0 10px #00ffaa;
      border: 2px solid #00ff88;
      cursor: pointer;
    }

    .feature-row {
      display: flex;
      justify-content: space-around;
      gap: 6px;
    }

    .feature-btn {
      background: rgba(15, 25, 20, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #c0ffd0;
      padding: 10px 8px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex: 1;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .feature-btn.active {
      background: rgba(0, 255, 100, 0.2);
      border-color: #00ff66;
      box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
      color: #b3ffcc;
    }

    #sleepTimerBtn.timer-active {
      background: rgba(155, 0, 255, 0.25);
      border-color: #9b00ff;
      box-shadow: 0 0 30px rgba(155, 0, 255, 0.7), 0 0 50px rgba(180, 0, 255, 0.4);
      animation: timerPulsePurple 1s ease-in-out infinite;
    }

    @keyframes timerPulsePurple {
      0%, 100% { box-shadow: 0 0 30px rgba(155, 0, 255, 0.7), 0 0 50px rgba(180, 0, 255, 0.4); }
      50% { box-shadow: 0 0 45px rgba(155, 0, 255, 1), 0 0 80px rgba(180, 0, 255, 0.7); }
    }

    .playlist-container {
      max-height: 140px;
      overflow-y: auto;
      background: rgba(5, 15, 8, 0.55);
      backdrop-filter: blur(18px);
      border-radius: 32px;
      padding: 6px;
      border: 1px solid rgba(0, 255, 100, 0.3);
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.02);
      color: #b0ffc0;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .playlist-item.active {
      background: rgba(0, 255, 100, 0.2);
      border-color: #00ff66;
      box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
      color: #ffffff;
    }

    .playlist-container::-webkit-scrollbar {
      width: 4px;
    }
    .playlist-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #00ff66, #00ffff);
      border-radius: 10px;
    }

    @media (max-width: 400px) {
      .player { padding: 20px 14px 24px; }
      .controls { gap: 20px; }
      .play-btn { width: 64px; height: 64px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="player-header">
      <div class="player-title">
        <i class="fas fa-headphones"></i> Tekhim's Mp3
      </div>
      <div class="badge">
        <i class="fas fa-bolt"></i> Music
      </div>
    </div>

    <div class="cover-container">
      <div class="cover-art" id="coverArt">
        <i class="fas fa-music"></i>
      </div>
    </div>

    <div class="song-info">
      <div class="song-title" id="songTitle">Pilih Lagu</div>
      <div class="song-artist" id="songArtist">Tekhim's Collection</div>
    </div>

    <div class="progress-area">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBarContainer">
        <div class="progress-fill" id="progressFill" style="width:0%;"></div>
      </div>
      <span id="durationTime">0:00</span>
    </div>

    <div class="controls">
      <div class="ctrl-btn" id="prevBtn"><i class="fas fa-backward"></i></div>
      <div class="ctrl-btn play-btn" id="playBtn"><i class="fas fa-play"></i></div>
      <div class="ctrl-btn" id="nextBtn"><i class="fas fa-forward"></i></div>
    </div>

    <div class="volume-container">
      <i class="fas fa-volume-up volume-icon"></i>
      <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
    </div>

    <div class="feature-row">
      <div class="feature-btn" id="shuffleBtn"><i class="fas fa-random"></i> Acak</div>
      <div class="feature-btn" id="continuousBtn"><i class="fas fa-repeat"></i> Loop</div>
      <div class="feature-btn" id="sleepTimerBtn"><i class="fas fa-clock"></i> Timer <span id="sleepTimerDisplay">off</span></div>
    </div>

    <div class="playlist-container" id="playlistContainer"></div>
  </div>

  <div class="timer-notification" id="timerNotification" style="display: none;">
    <i class="fas fa-hourglass-half"></i>
    <span id="timerNotificationText"></span>
  </div>

  <script>
    (function() {
      const playlist = [
        { title: "Hanya Rindu", artist: "Tekhim", src: "hanyarindu-violin.mp3", cover: "cover1.jpg" },
        { title: "Kiss The Rain", artist: "Tekhim", src: "kisstherain.mp3", cover: "cover1.jpg" },
        { title: "Bie Zhi Ji", artist: "Tekhim", src: "biezhiji-piano.mp3", cover: "cover1.jpg" },
        { title: "Qing Ren De Yen Lei", artist: "Tekhim", src: "qingren.mp3", cover: "cover1.jpg" },
        { title: "Sadness And Sorrow", artist: "Naruto", src: "sadness-and-sorrow(violin).mp3", cover: "cover1.jpg" }
      
      ];

      const audio = new Audio();
      let currentIndex = 0;
      let isPlaying = false;
      let shuffleMode = false;
      let continuousMode = false;
      let timerInterval = null;
      let remainingSeconds = 0;

      const coverArt = document.getElementById('coverArt');
      const songTitle = document.getElementById('songTitle');
      const songArtist = document.getElementById('songArtist');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const progressBarContainer = document.getElementById('progressBarContainer');
      const progressFill = document.getElementById('progressFill');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationTimeSpan = document.getElementById('durationTime');
      const volumeSlider = document.getElementById('volumeSlider');
      const shuffleBtn = document.getElementById('shuffleBtn');
      const continuousBtn = document.getElementById('continuousBtn');
      const sleepTimerBtn = document.getElementById('sleepTimerBtn');
      const sleepTimerDisplay = document.getElementById('sleepTimerDisplay');
      const playlistContainer = document.getElementById('playlistContainer');
      const timerNotification = document.getElementById('timerNotification');
      const timerNotificationText = document.getElementById('timerNotificationText');

      function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      }

      function showTimerNotification(message) {
        timerNotificationText.textContent = message;
        timerNotification.style.display = 'flex';
        setTimeout(() => timerNotification.style.display = 'none', 3000);
      }

      function loadSong(index) {
        currentIndex = (index + playlist.length) % playlist.length;
        const song = playlist[currentIndex];
        audio.src = song.src;
        songTitle.textContent = song.title;
        songArtist.textContent = song.artist;

        if (song.cover) {
          coverArt.style.backgroundImage = `url('${song.cover}')`;
          coverArt.innerHTML = '';
        }
        updatePlaylistActive();
      }

      function togglePlay() {
        if (isPlaying) audio.pause();
        else audio.play().catch(() => {});
        isPlaying = !isPlaying;
        playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      }

      function getNextIndex() {
        if (shuffleMode && playlist.length > 1) {
          let next;
          do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIndex);
          return next;
        }
        return (currentIndex + 1) % playlist.length;
      }

      function playNext() { loadSong(getNextIndex()); if (isPlaying) audio.play().catch(() => {}); }
      function playPrev() {
        if (shuffleMode) loadSong(Math.floor(Math.random() * playlist.length));
        else loadSong(currentIndex - 1);
        if (isPlaying) audio.play().catch(() => {});
      }

      // === URL PARAMETER (PENTING UNTUK VOICE) ===
      function handleURLParams() {
        const params = new URLSearchParams(window.location.search);
        const auto = params.get('auto');
        const shuffle = params.get('shuffle');
        const songQuery = params.get('song');

        if (shuffle === 'true') {
          shuffleMode = true;
          shuffleBtn.classList.add('active');
        }

        if (songQuery) {
          const found = playlist.findIndex(s => s.title.toLowerCase().includes(songQuery.toLowerCase()));
          if (found !== -1) loadSong(found);
          else loadSong(0);
        } else {
          loadSong(0);
        }

        if (auto === 'play') {
          setTimeout(() => {
            isPlaying = true;
            audio.play().catch(() => {});
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
          }, 800);
        }
      }

      // Media Session API
      function setupMediaSession() {
        if ('mediaSession' in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: songTitle.textContent,
            artist: songArtist.textContent,
          });
          navigator.mediaSession.setActionHandler('play', togglePlay);
          navigator.mediaSession.setActionHandler('pause', togglePlay);
          navigator.mediaSession.setActionHandler('previoustrack', playPrev);
          navigator.mediaSession.setActionHandler('nexttrack', playNext);
        }
      }

      function renderPlaylist() {
        playlistContainer.innerHTML = '';
        playlist.forEach((song, idx) => {
          const item = document.createElement('div');
          item.className = `playlist-item ${idx === currentIndex ? 'active' : ''}`;
          item.innerHTML = `<i class="fas fa-music"></i><span>${song.title}</span>`;
          item.addEventListener('click', () => {
            loadSong(idx);
            isPlaying = true;
            audio.play().catch(() => {});
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
          });
          playlistContainer.appendChild(item);
        });
      }

      function updatePlaylistActive() {
        document.querySelectorAll('.playlist-item').forEach((el, i) => {
          el.classList.toggle('active', i === currentIndex);
        });
      }

      // Event Listeners
      playBtn.addEventListener('click', togglePlay);
      prevBtn.addEventListener('click', playPrev);
      nextBtn.addEventListener('click', playNext);
      volumeSlider.addEventListener('input', () => audio.volume = parseFloat(volumeSlider.value));

      shuffleBtn.addEventListener('click', () => {
        shuffleMode = !shuffleMode;
        shuffleBtn.classList.toggle('active', shuffleMode);
      });

      continuousBtn.addEventListener('click', () => {
        continuousMode = !continuousMode;
        continuousBtn.classList.toggle('active', continuousMode);
      });

      sleepTimerBtn.addEventListener('click', () => {
        if (timerInterval) {
          clearInterval(timerInterval);
          sleepTimerDisplay.textContent = 'off';
          sleepTimerBtn.classList.remove('timer-active');
        } else {
          const min = prompt("⏰ Atur Sleep Timer (menit):", "15");
          if (min) {
            remainingSeconds = parseFloat(min) * 60;
            sleepTimerBtn.classList.add('timer-active');
            showTimerNotification(`Sleep Timer: ${min} menit`);
            timerInterval = setInterval(() => {
              remainingSeconds--;
              sleepTimerDisplay.textContent = Math.floor(remainingSeconds/60) + ":" + (remainingSeconds%60 < 10 ? "0" : "") + (remainingSeconds%60);
              if (remainingSeconds <= 0) {
                clearInterval(timerInterval);
                audio.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
              }
            }, 1000);
          }
        }
      });

      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const pct = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = pct + '%';
          currentTimeSpan.textContent = formatTime(audio.currentTime);
          durationTimeSpan.textContent = formatTime(audio.duration);
        }
      });

      audio.addEventListener('ended', () => {
        if (continuousMode) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        } else {
          playNext();
        }
      });

      progressBarContainer.addEventListener('click', (e) => {
        const width = progressBarContainer.clientWidth;
        audio.currentTime = (e.offsetX / width) * audio.duration;
      });

      // Inisialisasi
      renderPlaylist();
      handleURLParams();
      setupMediaSession();

<script>

function setupVoiceCommand() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        console.log("Browser ga support voice recognition");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.continuous = true; // Terus mendengarkan
    recognition.lang = 'id-ID'; // Bahasa Indonesia
    recognition.interimResults = false;

    recognition.onresult = function(event) {
        const last = event.results.length - 1;
        const command = event.results[last][0].transcript.toLowerCase();
        console.log("Perintah: " + command);

        if (command.includes("putar") || command.includes("play")) {
            // Panggil fungsi play di app kamu
            document.getElementById('audioPlayer').play(); 
        } else if (command.includes("berhenti") || command.includes("stop")) {
            document.getElementById('audioPlayer').pause();
        } else if (command.includes("next") || command.includes("lanjut")) {
            // Panggil fungsi next lagu
            playNextSong();
        }
    };

    recognition.onend = function() {
        recognition.start(); // Looping biar selalu nyala
    };

    recognition.start();
}

// Jalankan saat app dibuka (bisa di trigger lewat tombol biar user approve microphone dulu)
// <button onclick="setupVoiceCommand()">Aktifkan Voice Control</button>


  </script>
