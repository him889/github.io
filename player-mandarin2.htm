<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Tekhim's Mp3 Player • Multi Neon</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #010314;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Outfit', system-ui, sans-serif;
      padding: 16px;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(255, 0, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 60%);
    }

    .player {
      width: 100%;
      max-width: 420px;
      background: rgba(5, 10, 28, 0.78);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border-radius: 56px;
      padding: 24px 20px 30px;
      box-shadow: 
        0 40px 60px rgba(0, 0, 0, 0.85),
        0 0 0 1.5px rgba(255, 0, 255, 0.3),
        0 0 0 3px rgba(0, 255, 255, 0.15),
        0 0 50px rgba(255, 0, 255, 0.4),
        0 0 80px rgba(0, 200, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    /* Efek background animasi multi neon */
    .player::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        from 0deg, 
        transparent, 
        rgba(255, 0, 255, 0.06), 
        transparent, 
        rgba(0, 255, 255, 0.06), 
        transparent,
        rgba(255, 215, 0, 0.04),
        transparent
      );
      animation: rotateBg 18s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .player > * {
      position: relative;
      z-index: 2;
    }

    /* Header */
    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
    }

    .player-title {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6ec7, #00e0ff, #ffd700);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleShine 3s ease-in-out infinite;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes titleShine {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .player-title i {
      background: none;
      -webkit-text-fill-color: #ff6ec7;
      filter: drop-shadow(0 0 12px #ff00ff);
      font-size: 1.8rem;
    }

    .badge {
      background: rgba(255, 0, 255, 0.1);
      border-radius: 40px;
      padding: 5px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #ffb3ff;
      border: 1px solid rgba(255, 0, 255, 0.5);
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
    }

    /* Cover Art */
    .cover-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 5px 0;
    }

    .cover-art {
      width: 170px;
      height: 170px;
      border-radius: 40px;
      background: linear-gradient(145deg, #1a1040, #05051a);
      box-shadow: 
        0 25px 40px rgba(0, 0, 0, 0.8),
        0 0 35px rgba(255, 0, 255, 0.5),
        0 0 55px rgba(0, 200, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      color: rgba(255, 0, 255, 0.7);
      border: 2px solid rgba(255, 0, 255, 0.5);
      background-size: cover;
      background-position: center;
      z-index: 5;
      transition: all 0.3s ease;
    }

    .cover-container::before {
      content: "";
      position: absolute;
      width: 195px;
      height: 195px;
      border-radius: 50%;
      background: conic-gradient(from 90deg, #ff00ff, #00ffff, #ffd700, #ff00ff);
      opacity: 0.35;
      filter: blur(30px);
      z-index: 1;
      animation: rotateGlow 5s infinite linear;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Info lagu */
    .song-info {
      text-align: center;
    }

    .song-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0e6ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
    }

    .song-artist {
      font-size: 0.8rem;
      color: #b8a0ff;
      margin-top: 3px;
    }

    /* Progress */
    .progress-area {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c8bfff;
      font-size: 0.7rem;
      margin: 4px 0;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ffd700);
      border-radius: 10px;
      box-shadow: 0 0 18px #ff00ff, 0 0 28px #00ffff;
      transition: width 0.1s linear;
    }

    /* === TOMBOL KONTROL UTAMA DENGAN EFEK === */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin: 8px 0;
    }

    .ctrl-btn {
      position: relative;
      background: rgba(10, 20, 40, 0.5);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: #e0d0ff;
      font-size: 1.2rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    /* Efek ripple saat ditekan */
    .ctrl-btn::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 0, 255, 0.6), transparent 70%);
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s ease;
    }

    .ctrl-btn:active::after {
      opacity: 1;
      transform: scale(1.8);
      transition: all 0.15s ease;
    }

    .ctrl-btn:active {
      transform: scale(0.85);
      border-color: #ff00ff;
      box-shadow: 0 0 25px #ff00ff, 0 0 40px #00ffff, 0 0 15px #ffd700;
    }

    /* Tombol Play spesial */
    .play-btn {
      width: 72px;
      height: 72px;
      font-size: 1.8rem;
      background: radial-gradient(circle at 30% 30%, #3d1060, #0a0020);
      border: 2px solid rgba(255, 0, 255, 0.7);
      box-shadow: 0 0 30px #ff00ff, 0 0 50px #00ffff, 0 0 20px #ffd700;
      animation: playPulse 2s ease-in-out infinite;
    }

    @keyframes playPulse {
      0%, 100% { box-shadow: 0 0 30px #ff00ff, 0 0 50px #00ffff, 0 0 20px #ffd700; }
      50% { box-shadow: 0 0 45px #ff00ff, 0 0 70px #00ffff, 0 0 35px #ffd700; }
    }

    .play-btn:active {
      animation: none;
      transform: scale(0.9);
      box-shadow: 0 0 60px #ff00ff, 0 0 90px #00ffff, 0 0 50px #ffd700;
    }

    /* Tombol prev/next dengan efek warna berbeda */
    #prevBtn {
      border-color: rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }

    #prevBtn:active {
      border-color: #00ffff;
      box-shadow: 0 0 30px #00ffff, 0 0 50px #ff00ff;
    }

    #nextBtn {
      border-color: rgba(255, 215, 0, 0.5);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    #nextBtn:active {
      border-color: #ffd700;
      box-shadow: 0 0 30px #ffd700, 0 0 50px #ff00ff;
    }

    /* Volume slider */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(15, 10, 35, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 8px 16px;
      border: 1px solid rgba(255, 0, 255, 0.3);
    }

    .volume-icon {
      color: #ff6ec7;
      font-size: 1rem;
      filter: drop-shadow(0 0 6px #ff00ff);
    }

    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ffd700);
      border-radius: 5px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
      border: 2px solid #ff00ff;
    }

    /* Fitur row */
    .feature-row {
      display: flex;
      justify-content: space-around;
      gap: 6px;
    }

    .feature-btn {
      background: rgba(20, 15, 40, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #d0c0ff;
      padding: 10px 8px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex: 1;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .feature-btn.active {
      background: rgba(255, 0, 255, 0.2);
      border-color: #ff00ff;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
      color: #ffb3ff;
    }

    .feature-btn:active {
      transform: scale(0.95);
      box-shadow: 0 0 25px #00ffff;
    }

    /* Playlist */
    .playlist-container {
      max-height: 140px;
      overflow-y: auto;
      background: rgba(5, 3, 20, 0.55);
      backdrop-filter: blur(18px);
      border-radius: 32px;
      padding: 6px;
      border: 1px solid rgba(255, 0, 255, 0.25);
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.02);
      color: #d0c0ff;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .playlist-item.active {
      background: rgba(255, 0, 255, 0.2);
      border-color: #ff00ff;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
      color: #fff;
    }

    .playlist-item:active {
      background: rgba(0, 255, 255, 0.2);
      border-color: #00ffff;
    }

    /* Scrollbar */
    .playlist-container::-webkit-scrollbar {
      width: 4px;
    }
    .playlist-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #ff00ff, #00ffff);
      border-radius: 10px;
    }

    @media (max-width: 400px) {
      .player {
        padding: 20px 14px 24px;
      }
      .controls {
        gap: 20px;
      }
      .ctrl-btn {
        width: 46px;
        height: 46px;
        font-size: 1rem;
      }
      .play-btn {
        width: 64px;
        height: 64px;
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="player">
    <!-- Header -->
    <div class="player-header">
      <div class="player-title">
        <i class="fas fa-headphones"></i> Tekhim's Mp3
      </div>
      <div class="badge">
        <i class="fas fa-bolt"></i> NEON
      </div>
    </div>

    <!-- Cover Art -->
    <div class="cover-container">
      <div class="cover-art" id="coverArt">
        <i class="fas fa-music"></i>
      </div>
    </div>

    <!-- Info lagu -->
    <div class="song-info">
      <div class="song-title" id="songTitle">Pilih Lagu</div>
      <div class="song-artist" id="songArtist">Tekhim's Collection</div>
    </div>

    <!-- Progress bar -->
    <div class="progress-area">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBarContainer">
        <div class="progress-fill" id="progressFill" style="width:0%;"></div>
      </div>
      <span id="durationTime">0:00</span>
    </div>

    <!-- Tombol kontrol dengan efek -->
    <div class="controls">
      <div class="ctrl-btn" id="prevBtn">
        <i class="fas fa-backward"></i>
      </div>
      <div class="ctrl-btn play-btn" id="playBtn">
        <i class="fas fa-play"></i>
      </div>
      <div class="ctrl-btn" id="nextBtn">
        <i class="fas fa-forward"></i>
      </div>
    </div>

    <!-- Volume -->
    <div class="volume-container">
      <i class="fas fa-volume-up volume-icon"></i>
      <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
    </div>

    <!-- Fitur: Shuffle, Continuous, Sleep Timer -->
    <div class="feature-row">
      <div class="feature-btn" id="shuffleBtn">
        <i class="fas fa-random"></i> Acak
      </div>
      <div class="feature-btn" id="continuousBtn">
        <i class="fas fa-repeat"></i> Loop
      </div>
      <div class="feature-btn" id="sleepTimerBtn">
        <i class="fas fa-clock"></i> Timer <span id="sleepTimerDisplay">off</span>
      </div>
    </div>

    <!-- Playlist -->
    <div class="playlist-container" id="playlistContainer"></div>
  </div>

  <script>
    (function() {
      // ========== DAFTAR LAGU (EDIT SESUAI KOLEKSI) ==========
      const playlist = [
        {
          title: "Synthwave Dreams",
          artist: "Tekhim",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
          cover: "https://images.unsplash.com/photo-1614149162883-504ce4d13909?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Neon Pulse",
          artist: "CyberTek",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
          cover: "https://images.unsplash.com/photo-1550684376-efcbd6e3f031?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Digital Horizon",
          artist: "Tekhim",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
          cover: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Galactic Echo",
          artist: "AstroTek",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
          cover: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=300&h=300&fit=crop&auto=format"
        }
      ];

      const audio = new Audio();
      let currentIndex = 0;
      let isPlaying = false;
      let shuffleMode = false;
      let continuousMode = false;
      let sleepTimer = null;

      // DOM
      const coverArt = document.getElementById('coverArt');
      const songTitle = document.getElementById('songTitle');
      const songArtist = document.getElementById('songArtist');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const progressBarContainer = document.getElementById('progressBarContainer');
      const progressFill = document.getElementById('progressFill');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationTimeSpan = document.getElementById('durationTime');
      const volumeSlider = document.getElementById('volumeSlider');
      const shuffleBtn = document.getElementById('shuffleBtn');
      const continuousBtn = document.getElementById('continuousBtn');
      const sleepTimerBtn = document.getElementById('sleepTimerBtn');
      const sleepTimerDisplay = document.getElementById('sleepTimerDisplay');
      const playlistContainer = document.getElementById('playlistContainer');

      // Format waktu
      function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      }

      // Muat lagu
      function loadSong(index) {
        if (!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const song = playlist[currentIndex];
        audio.src = song.src;
        songTitle.textContent = song.title;
        songArtist.textContent = song.artist;
        
        if (song.cover && song.cover.trim() !== '') {
          coverArt.style.backgroundImage = `url('${song.cover}')`;
          coverArt.innerHTML = '';
        } else {
          coverArt.style.backgroundImage = '';
          coverArt.innerHTML = '<i class="fas fa-music"></i>';
        }
        
        updatePlaylistActive();
        progressFill.style.width = '0%';
        currentTimeSpan.textContent = '0:00';
        durationTimeSpan.textContent = '0:00';
        
        if (isPlaying) {
          audio.play().catch(() => {});
        }
      }

      // Play/Pause
      function togglePlay() {
        if (!playlist.length) return;
        if (isPlaying) {
          audio.pause();
        } else {
          audio.play().catch(() => {});
        }
        isPlaying = !isPlaying;
        updatePlayBtn();
      }

      function updatePlayBtn() {
        playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      }

      // Navigasi lagu
      function getNextIndex() {
        if (shuffleMode && playlist.length > 1) {
          let next;
          do {
            next = Math.floor(Math.random() * playlist.length);
          } while (next === currentIndex && playlist.length > 1);
          return next;
        }
        return (currentIndex + 1) % playlist.length;
      }

      function playNext() {
        if (!playlist.length) return;
        const nextIdx = getNextIndex();
        currentIndex = nextIdx;
        loadSong(currentIndex);
        if (isPlaying) audio.play().catch(() => {});
      }

      function playPrev() {
        if (!playlist.length) return;
        if (shuffleMode && playlist.length > 1) {
          let prev;
          do {
            prev = Math.floor(Math.random() * playlist.length);
          } while (prev === currentIndex && playlist.length > 1);
          currentIndex = prev;
        } else {
          currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        }
        loadSong(currentIndex);
        if (isPlaying) audio.play().catch(() => {});
      }

      // Progress
      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const pct = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = `${pct}%`;
          currentTimeSpan.textContent = formatTime(audio.currentTime);
          durationTimeSpan.textContent = formatTime(audio.duration);
        }
      });

      audio.addEventListener('loadedmetadata', () => {
        durationTimeSpan.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('ended', () => {
        if (continuousMode) {
          loadSong(currentIndex);
          audio.play().catch(() => {});
        } else {
          playNext();
        }
      });

      progressBarContainer.addEventListener('click', (e) => {
        const width = progressBarContainer.clientWidth;
        const clickX = e.offsetX;
        if (audio.duration && width) {
          audio.currentTime = (clickX / width) * audio.duration;
        }
      });

      // Volume
      audio.volume = 0.8;
      volumeSlider.addEventListener('input', () => {
        audio.volume = parseFloat(volumeSlider.value);
      });

      // Shuffle
      shuffleBtn.addEventListener('click', function() {
        shuffleMode = !shuffleMode;
        this.classList.toggle('active', shuffleMode);
      });

      // Continuous
      continuousBtn.addEventListener('click', function() {
        continuousMode = !continuousMode;
        this.classList.toggle('active', continuousMode);
      });

      // Sleep Timer
      sleepTimerBtn.addEventListener('click', function() {
        if (sleepTimer) {
          clearTimeout(sleepTimer);
          sleepTimer = null;
          sleepTimerDisplay.textContent = 'off';
          this.classList.remove('active');
        } else {
          const min = prompt("Atur sleep timer (menit):", "15");
          if (!min) return;
          const num = parseFloat(min);
          if (isNaN(num) || num <= 0) return;
          sleepTimerDisplay.textContent = num + 'm';
          this.classList.add('active');
          sleepTimer = setTimeout(() => {
            audio.pause();
            isPlaying = false;
            updatePlayBtn();
            sleepTimer = null;
            sleepTimerDisplay.textContent = 'off';
            sleepTimerBtn.classList.remove('active');
          }, num * 60000);
        }
      });

      // Event listener tombol kontrol
      playBtn.addEventListener('click', togglePlay);
      prevBtn.addEventListener('click', playPrev);
      nextBtn.addEventListener('click', playNext);

      // Render playlist
      function renderPlaylist() {
        playlistContainer.innerHTML = '';
        playlist.forEach((song, idx) => {
          const item = document.createElement('div');
          item.className = `playlist-item ${idx === currentIndex ? 'active' : ''}`;
          item.innerHTML = `<i class="fas fa-music"></i><span>${song.title} - ${song.artist}</span>`;
          item.addEventListener('click', () => {
            if (idx === currentIndex && isPlaying) {
              togglePlay();
            } else {
              currentIndex = idx;
              loadSong(currentIndex);
              isPlaying = true;
              audio.play().catch(() => {});
              updatePlayBtn();
            }
          });
          playlistContainer.appendChild(item);
        });
      }

      function updatePlaylistActive() {
        document.querySelectorAll('.playlist-item').forEach((el, i) => {
          el.classList.toggle('active', i === currentIndex);
        });
      }

      // Inisialisasi
      renderPlaylist();
      if (playlist.length) loadSong(0);
      updatePlayBtn();
    })();
  </script>
</body>
  </html>
