<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Tekhim's Mp3 Player • Futuristik</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #03050b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Outfit', system-ui, -apple-system, sans-serif;
      padding: 16px;
      background-image: radial-gradient(ellipse at 30% 40%, #1a2340 0%, #020210 90%);
    }

    /* KULIT UTAMA - LEBIH KEREN & GLASSMORPHISM */
    .player {
      width: 100%;
      max-width: 420px;
      background: rgba(8, 12, 30, 0.7);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-radius: 56px;
      padding: 24px 20px 30px;
      box-shadow: 
        0 40px 60px rgba(0, 0, 0, 0.8),
        0 0 0 1.5px rgba(0, 255, 255, 0.35),
        0 0 40px rgba(0, 180, 255, 0.5),
        inset 0 0 30px rgba(0, 255, 255, 0.08);
      border: 1px solid rgba(0, 255, 255, 0.25);
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    /* Efek garis futuristik di background */
    .player::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 180deg, transparent, rgba(0, 255, 200, 0.08), transparent, rgba(0, 100, 255, 0.08), transparent);
      animation: rotateBg 20s linear infinite;
      z-index: 0;
      pointer-events: none;
      border-radius: inherit;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Semua konten di atas efek */
    .player > * {
      position: relative;
      z-index: 2;
    }

    /* Header */
    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #b7f0ff;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 0 6px;
    }

    .player-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c4f0ff, #5bc0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 18px #0088ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-title i {
      background: none;
      -webkit-text-fill-color: #5ee0ff;
      text-shadow: 0 0 20px cyan;
      font-size: 1.9rem;
    }

    .badge {
      background: rgba(0, 255, 255, 0.12);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #b3f0ff;
      border: 1px solid rgba(0, 255, 255, 0.45);
      backdrop-filter: blur(10px);
      letter-spacing: 0.5px;
    }

    /* Cover Art */
    .cover-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8px 0 10px;
    }

    .cover-art {
      width: 175px;
      height: 175px;
      border-radius: 40px;
      background: linear-gradient(145deg, #0a1230, #010314);
      box-shadow: 0 25px 40px rgba(0,0,0,0.8), 0 0 40px rgba(0, 180, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      color: rgba(0, 255, 255, 0.8);
      border: 2px solid rgba(0, 255, 255, 0.55);
      transition: 0.3s;
      background-size: cover;
      background-position: center;
      z-index: 5;
      position: relative;
    }

    .cover-container::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: conic-gradient(from 90deg, #00ffff, #006eff, #b200ff, #00ffff);
      opacity: 0.35;
      filter: blur(30px);
      z-index: 1;
      animation: rotateGlow 6s infinite linear;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .song-info {
      text-align: center;
      margin: 2px 0;
    }

    .song-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #ecfcff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 15px #0077ff;
    }

    .song-artist {
      font-size: 0.85rem;
      color: #a0c7f0;
      margin-top: 4px;
      font-weight: 400;
    }

    /* Progress */
    .progress-area {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c8e7ff;
      font-size: 0.7rem;
      font-weight: 500;
      margin: 6px 0;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: inset 0 0 8px black;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ffff, #0080ff);
      border-radius: 10px;
      box-shadow: 0 0 18px #00a6ff;
    }

    /* Tombol kontrol */
    .controls {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      margin: 5px 0 8px;
    }

    .ctrl-btn {
      background: rgba(10, 20, 40, 0.65);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 255, 255, 0.4);
      color: #d4f0ff;
      font-size: 1.3rem;
      width: 50px;
      height: 50px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(0,0,0,0.6);
      transition: 0.2s;
    }

    .ctrl-btn:active {
      transform: scale(0.9);
      background: rgba(0, 180, 255, 0.3);
      box-shadow: 0 0 24px cyan;
    }

    .play-btn {
      width: 68px;
      height: 68px;
      font-size: 2rem;
      background: radial-gradient(circle at 30% 30%, #003b6f, #000c1f);
      border: 2px solid #00e0ff;
      box-shadow: 0 0 30px #0077ff;
    }

    /* Kontrol kecepatan */
    .speed-control {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: rgba(0, 15, 35, 0.55);
      backdrop-filter: blur(16px);
      border-radius: 40px;
      padding: 8px 18px;
      border: 1px solid rgba(0, 255, 255, 0.35);
    }

    .speed-btn {
      background: transparent;
      border: none;
      color: #8ad4ff;
      font-size: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0, 255, 255, 0.45);
      transition: 0.2s;
    }

    .speed-btn:active {
      background: #00b7ff33;
      color: white;
      box-shadow: 0 0 18px cyan;
    }

    .speed-value {
      font-weight: 700;
      font-size: 1.2rem;
      color: #00f2ff;
      min-width: 45px;
      text-align: center;
    }

    /* Baris fitur: shuffle, continuous, sleep timer */
    .feature-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 6px;
      margin: 2px 0;
    }

    .feature-btn {
      background: rgba(20, 30, 50, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      color: #b3e5ff;
      padding: 10px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      flex: 1;
      justify-content: center;
      white-space: nowrap;
    }

    .feature-btn.active {
      background: rgba(0, 200, 255, 0.3);
      border-color: #00ffff;
      box-shadow: 0 0 18px #0099ff;
      color: white;
    }

    .sleep-timer-display {
      background: rgba(0, 0, 0, 0.4);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 4px;
      font-weight: 700;
      color: cyan;
    }

    /* Playlist */
    .playlist-container {
      max-height: 150px;
      overflow-y: auto;
      background: rgba(0, 3, 15, 0.55);
      backdrop-filter: blur(18px);
      border-radius: 32px;
      padding: 8px 6px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 3px 0;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.02);
      color: #cce7ff;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .playlist-item.active {
      background: rgba(0, 160, 255, 0.3);
      border: 1px solid #00e0ff;
      box-shadow: 0 0 18px #0066cc;
    }

    .playlist-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 400px) {
      .player {
        padding: 20px 14px 24px;
      }
      .cover-art {
        width: 150px;
        height: 150px;
        font-size: 4rem;
      }
      .feature-btn {
        font-size: 0.7rem;
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="player">
    <!-- Header -->
    <div class="player-header">
      <div class="player-title">
        <i class="fas fa-headphones"></i> Tekhim's Mp3
      </div>
      <div class="badge">
        <i class="fas fa-microchip"></i> NEON
      </div>
    </div>

    <!-- Cover -->
    <div class="cover-container">
      <div class="cover-art" id="coverArt">
        <i class="fas fa-music"></i>
      </div>
    </div>

    <!-- Info lagu -->
    <div class="song-info">
      <div class="song-title" id="songTitle">Pilih Lagu</div>
      <div class="song-artist" id="songArtist">Tekhim's Collection</div>
    </div>

    <!-- Progress -->
    <div class="progress-area">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBarContainer">
        <div class="progress-fill" id="progressFill" style="width:0%;"></div>
      </div>
      <span id="durationTime">0:00</span>
    </div>

    <!-- Kontrol -->
    <div class="controls">
      <div class="ctrl-btn" id="prevBtn"><i class="fas fa-backward"></i></div>
      <div class="ctrl-btn play-btn" id="playBtn"><i class="fas fa-play"></i></div>
      <div class="ctrl-btn" id="nextBtn"><i class="fas fa-forward"></i></div>
    </div>

    <!-- Kecepatan -->
    <div class="speed-control">
      <button class="speed-btn" id="speedDown"><i class="fas fa-minus"></i></button>
      <span class="speed-value" id="speedDisplay">1.0x</span>
      <button class="speed-btn" id="speedUp"><i class="fas fa-plus"></i></button>
      <button class="speed-btn" id="resetSpeed"><i class="fas fa-undo-alt"></i></button>
    </div>

    <!-- FITUR BARU: Shuffle, Continuous, Sleep Timer -->
    <div class="feature-row">
      <div class="feature-btn" id="shuffleBtn">
        <i class="fas fa-random"></i> <span>Acak</span>
      </div>
      <div class="feature-btn" id="continuousBtn">
        <i class="fas fa-repeat"></i> <span>Loop</span>
      </div>
      <div class="feature-btn" id="sleepTimerBtn">
        <i class="fas fa-clock"></i> <span>Timer</span>
        <span class="sleep-timer-display" id="sleepTimerDisplay">off</span>
      </div>
    </div>

    <!-- Daftar putar -->
    <div class="playlist-container" id="playlistContainer"></div>
  </div>

  <script>
    (function() {
      // ---------- KOLEKSI LAGU (EDIT SESUAI KAMU) ----------
      const playlist = [
        {
          title: "Qing Ren De Yen Lei",
          artist: "Tekhim",
          src: "qingren.mp3",
          cover: "https://images.unsplash.com/photo-1614149162883-504ce4d13909?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Neon Pulse",
          artist: "CyberTek",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
          cover: "https://images.unsplash.com/photo-1550684376-efcbd6e3f031?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Digital Horizon",
          artist: "Tekhim",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
          cover: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Galactic Echo",
          artist: "AstroTek",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
          cover: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=300&h=300&fit=crop&auto=format"
        }
      ];

      const audio = new Audio();
      let currentIndex = 0;
      let isPlaying = false;
      let playbackSpeed = 1.0;
      let shuffleMode = false;
      let continuousMode = false;
      let sleepTimer = null;
      let sleepEndTime = null;

      // DOM
      const coverArt = document.getElementById('coverArt');
      const songTitle = document.getElementById('songTitle');
      const songArtist = document.getElementById('songArtist');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const progressBarContainer = document.getElementById('progressBarContainer');
      const progressFill = document.getElementById('progressFill');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationTimeSpan = document.getElementById('durationTime');
      const speedDisplay = document.getElementById('speedDisplay');
      const playlistContainer = document.getElementById('playlistContainer');
      
      const shuffleBtn = document.getElementById('shuffleBtn');
      const continuousBtn = document.getElementById('continuousBtn');
      const sleepTimerBtn = document.getElementById('sleepTimerBtn');
      const sleepTimerDisplay = document.getElementById('sleepTimerDisplay');

      function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      }

      function loadSong(index) {
        if (!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const song = playlist[currentIndex];
        audio.src = song.src;
        audio.playbackRate = playbackSpeed;
        songTitle.textContent = song.title;
        songArtist.textContent = song.artist;
        if (song.cover) {
          coverArt.style.backgroundImage = `url('${song.cover}')`;
          coverArt.innerHTML = '';
        } else {
          coverArt.style.backgroundImage = '';
          coverArt.innerHTML = '<i class="fas fa-music"></i>';
        }
        updatePlaylistActive();
        progressFill.style.width = '0%';
        currentTimeSpan.textContent = '0:00';
        if (isPlaying) audio.play().catch(()=>{});
      }

      function togglePlay() {
        if (!playlist.length) return;
        if (isPlaying) {
          audio.pause();
        } else {
          audio.play().catch(()=>{});
        }
        isPlaying = !isPlaying;
        updatePlayBtn();
      }

      function updatePlayBtn() {
        playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      }

      function getNextIndex() {
        if (shuffleMode && playlist.length > 1) {
          let next;
          do {
            next = Math.floor(Math.random() * playlist.length);
          } while (next === currentIndex && playlist.length > 1);
          return next;
        } else {
          return (currentIndex + 1) % playlist.length;
        }
      }

      function playNext() {
        if (!playlist.length) return;
        const nextIdx = getNextIndex();
        currentIndex = nextIdx;
        loadSong(currentIndex);
        if (isPlaying) audio.play().catch(()=>{});
      }

      function playPrev() {
        if (!playlist.length) return;
        if (shuffleMode && playlist.length > 1) {
          let prev;
          do {
            prev = Math.floor(Math.random() * playlist.length);
          } while (prev === currentIndex && playlist.length > 1);
          currentIndex = prev;
        } else {
          currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        }
        loadSong(currentIndex);
        if (isPlaying) audio.play().catch(()=>{});
      }

      function updateProgress() {
        if (audio.duration) {
          const pct = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = `${pct}%`;
          currentTimeSpan.textContent = formatTime(audio.currentTime);
          durationTimeSpan.textContent = formatTime(audio.duration);
        }
      }

      function setProgress(e) {
        const width = progressBarContainer.clientWidth;
        const clickX = e.offsetX;
        if (audio.duration && width) {
          audio.currentTime = (clickX / width) * audio.duration;
        }
      }

      function setSpeed(val) {
        playbackSpeed = Math.min(2.5, Math.max(0.5, val));
        audio.playbackRate = playbackSpeed;
        speedDisplay.textContent = playbackSpeed.toFixed(1) + 'x';
      }

      // Shuffle
      function toggleShuffle() {
        shuffleMode = !shuffleMode;
        shuffleBtn.classList.toggle('active', shuffleMode);
      }

      // Continuous
      function toggleContinuous() {
        continuousMode = !continuousMode;
        continuousBtn.classList.toggle('active', continuousMode);
      }

      // Sleep Timer
      function clearSleepTimer() {
        if (sleepTimer) {
          clearTimeout(sleepTimer);
          sleepTimer = null;
        }
        sleepEndTime = null;
        sleepTimerDisplay.textContent = 'off';
        sleepTimerBtn.classList.remove('active');
      }

      function startSleepTimer(minutes) {
        clearSleepTimer();
        if (!minutes || minutes <= 0) {
          clearSleepTimer();
          return;
        }
        const ms = minutes * 60 * 1000;
        sleepEndTime = Date.now() + ms;
        sleepTimerDisplay.textContent = minutes + 'm';
        sleepTimerBtn.classList.add('active');
        
        sleepTimer = setTimeout(() => {
          audio.pause();
          isPlaying = false;
          updatePlayBtn();
          clearSleepTimer();
          alert('⏰ Sleep Timer: Musik dihentikan.');
        }, ms);
      }

      function cycleSleepTimer() {
        if (sleepTimer) {
          clearSleepTimer();
          return;
        }
        const minutes = prompt("Atur sleep timer (menit), contoh: 10 / 30 / 60. Kosongkan untuk batal:", "15");
        if (minutes === null) return;
        const num = parseFloat(minutes);
        if (isNaN(num) || num <= 0) {
          clearSleepTimer();
          return;
        }
        startSleepTimer(num);
      }

      // Render playlist
      function renderPlaylist() {
        playlistContainer.innerHTML = '';
        playlist.forEach((song, idx) => {
          const item = document.createElement('div');
          item.className = `playlist-item ${idx === currentIndex ? 'active' : ''}`;
          item.innerHTML = `<i class="fas fa-music"></i><span class="playlist-title">${song.title} - ${song.artist}</span>`;
          item.addEventListener('click', () => {
            if (idx === currentIndex && isPlaying) {
              togglePlay();
            } else {
              currentIndex = idx;
              loadSong(currentIndex);
              isPlaying = true;
              audio.play().catch(()=>{});
              updatePlayBtn();
            }
          });
          playlistContainer.appendChild(item);
        });
      }

      function updatePlaylistActive() {
        document.querySelectorAll('.playlist-item').forEach((el, i) => {
          el.classList.toggle('active', i === currentIndex);
        });
      }

      // Event listeners
      playBtn.addEventListener('click', togglePlay);
      prevBtn.addEventListener('click', playPrev);
      nextBtn.addEventListener('click', playNext);
      progressBarContainer.addEventListener('click', setProgress);
      
      audio.addEventListener('timeupdate', updateProgress);
      audio.addEventListener('loadedmetadata', () => {
        durationTimeSpan.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('ended', () => {
        if (continuousMode) {
          loadSong(currentIndex);
          audio.play().catch(()=>{});
        } else {
          playNext();
        }
      });

      document.getElementById('speedUp').addEventListener('click', () => setSpeed(playbackSpeed + 0.25));
      document.getElementById('speedDown').addEventListener('click', () => setSpeed(playbackSpeed - 0.25));
      document.getElementById('resetSpeed').addEventListener('click', () => setSpeed(1.0));

      shuffleBtn.addEventListener('click', toggleShuffle);
      continuousBtn.addEventListener('click', toggleContinuous);
      sleepTimerBtn.addEventListener('click', cycleSleepTimer);

      // Init
      renderPlaylist();
      if (playlist.length) loadSong(0);
      updatePlayBtn();
    })();
  </script>
</body>
  </html>
