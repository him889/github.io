        function getLocalStorageKey() {

            const pageName = window.location.pathname.split('/').pop();

            return `${pageName.replace('.htm', '')}Data`;

        }

        const localStorageKey = getLocalStorageKey();

        function initializeData() {

            const savedData = JSON.parse(localStorage.getItem(localStorageKey)) || [];

            if (savedData.length === 0) {

                localStorage.setItem(localStorageKey, JSON.stringify(initialData));

            }

            loadData();

        }

        function isValidDate(dateStr) {

            const [day, month, year] = dateStr.split('/').map(Number);

            const date = new Date(`20${year}`, month - 1, day);

            return (

                date.getDate() === day &&

                date.getMonth() === month - 1 &&

                date.getFullYear() === 2000 + year

            );

        }

        function loadData(filter = '') {

            const tableBody = document.getElementById('dataTableBody');

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || initialData;

            savedData.sort((a, b) => {

                const dateA = new Date(`20${a.date.slice(6,8)}`, a.date.slice(3,5)-1, a.date.slice(0,2));

                const dateB = new Date(`20${b.date.slice(6,8)}`, b.date.slice(3,5)-1, b.date.slice(0,2));

                return dateB - dateA;

            });

            tableBody.innerHTML = '';

            savedData.forEach((data, index) => {

                if (filter === '' || 

                    data.date.toLowerCase().includes(filter.toLowerCase()) || 

                    data.number.includes(filter)) {

                    addRowToTable(data.date, data.number, index);

                }

            });

        }

        function addRowToTable(date, number, index) {

            const tableBody = document.getElementById('dataTableBody');

            const newRow = document.createElement('tr');

            newRow.setAttribute('data-index', index);

            newRow.innerHTML = `

                <td>${date}</td>

                <td>${number}</td>

                <td>

                    <button class="edit-button" onclick="editRow(${index})">Edit</button>

                    <button class="delete-button" onclick="deleteRow(${index})">Hapus</button>

                </td>

            `;

            tableBody.appendChild(newRow);

        }

        document.getElementById('searchInput').addEventListener('input', function() {

            const query = this.value.trim();

            loadData(query);

        });

        function addData() {

            const dateInput = document.getElementById('dateInput').value.trim();

            const numberInput = document.getElementById('numberInput').value.trim();

            const errorMessage = document.getElementById('errorMessage');

            const datePattern = /^\d{2}\/\d{2}\/\d{2}$/;

            if (!datePattern.test(dateInput) || !isValidDate(dateInput)) {

                errorMessage.textContent = 'Masukkan tanggal yang valid dalam format DD/MM/YY';

                errorMessage.style.display = 'block';

                setTimeout(() => errorMessage.style.display = 'none', 3000);

                return;

            }

            const numberPattern = /^\d{4}$/;

            if (!numberPattern.test(numberInput)) {

                errorMessage.textContent = 'Masukkan nomor 4 digit angka';

                errorMessage.style.display = 'block';

                setTimeout(() => errorMessage.style.display = 'none', 3000);

                return;

            }

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || [];

            savedData.push({ date: dateInput, number: numberInput });

            savedData.sort((a, b) => {

                const dateA = new Date(`20${a.date.slice(6,8)}`, a.date.slice(3,5)-1, a.date.slice(0,2));

                const dateB = new Date(`20${b.date.slice(6,8)}`, b.date.slice(3,5)-1, b.date.slice(0,2));

                return dateB - dateA;

            });

            localStorage.setItem(localStorageKey, JSON.stringify(savedData));

            loadData(document.getElementById('searchInput').value.trim());

            document.getElementById('dateInput').value = '';

            document.getElementById('numberInput').value = '';

        }

        function editRow(index) {

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || [];

            const dataToEdit = savedData[index];

            document.getElementById('dateInput').value = dataToEdit.date;

            document.getElementById('numberInput').value = dataToEdit.number;

            editRowIndex = index;

            const submitButton = document.querySelector('#dataForm button[type="submit"]');

            submitButton.textContent = 'Simpan Edit';

        }

        function saveEdit() {

            const dateInput = document.getElementById('dateInput').value.trim();

            const numberInput = document.getElementById('numberInput').value.trim();

            const errorMessage = document.getElementById('errorMessage');

            const datePattern = /^\d{2}\/\d{2}\/\d{2}$/;

            if (!datePattern.test(dateInput) || !isValidDate(dateInput)) {

                errorMessage.textContent = 'Masukkan tanggal yang valid dalam format DD/MM/YY';

                errorMessage.style.display = 'block';

                setTimeout(() => errorMessage.style.display = 'none', 3000);

                return;

            }

            const numberPattern = /^\d{4}$/;

            if (!numberPattern.test(numberInput)) {

                errorMessage.textContent = 'Masukkan nomor 4 digit angka';

                errorMessage.style.display = 'block';

                setTimeout(() => errorMessage.style.display = 'none', 3000);

                return;

            }

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || [];

            savedData[editRowIndex] = { date: dateInput, number: numberInput };

            savedData.sort((a, b) => {

                const dateA = new Date(`20${a.date.slice(6,8)}`, a.date.slice(3,5)-1, a.date.slice(0,2));

                const dateB = new Date(`20${b.date.slice(6,8)}`, b.date.slice(3,5)-1, b.date.slice(0,2));

                return dateB - dateA;

            });

            localStorage.setItem(localStorageKey, JSON.stringify(savedData));

            loadData(document.getElementById('searchInput').value.trim());

            document.getElementById('dateInput').value = '';

            document.getElementById('numberInput').value = '';

            const submitButton = document.querySelector('#dataForm button[type="submit"]');

            submitButton.textContent = 'Tambah Data';

            editRowIndex = null;

        }

        function deleteRow(index) {

            if (!confirm('Yakin ingin menghapus data ini?')) return;

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || [];

            savedData.splice(index, 1);

            savedData.sort((a, b) => {

                const dateA = new Date(`20${a.date.slice(6,8)}`, a.date.slice(3,5)-1, a.date.slice(0,2));

                const dateB = new Date(`20${b.date.slice(6,8)}`, b.date.slice(3,5)-1, b.date.slice(0,2));

                return dateB - dateA;

            });

            localStorage.setItem(localStorageKey, JSON.stringify(savedData));

            loadData(document.getElementById('searchInput').value.trim());

        }

        document.getElementById('dataForm').addEventListener('submit', function(e) {

            e.preventDefault();

            if (editRowIndex !== null) {

                saveEdit();

            } else {

                addData();

            }

        });

        function shareData() {

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || initialData;

            let text = 'Data HK Pools 2025\n\nTanggal - Nomor\n';

            savedData.forEach(item => {

                text += `${item.date} - ${item.number}\n`;

            });

            if (navigator.share) {

                navigator.share({

                    title: 'Data HK Pools 2025',

                    text: text

                }).catch(err => console.log('Error sharing', err));

            } else {

                navigator.clipboard.writeText(text).then(() => {

                    alert('Data telah disalin ke clipboard!');

                }).catch(() => {

                    alert('Data:\n\n' + text);

                });

            }

        }

        function downloadText() {

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || initialData;

            let text = 'Data HK Pools 2025\n\nTanggal\tNomor\n';

            savedData.forEach(item => {

                text += `${item.date}\t${item.number}\n`;

            });

            const blob = new Blob([text], { type: 'text/plain' });

            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');

            a.href = url;

            a.download = 'data_hk_2025.txt';

            a.click();

            URL.revokeObjectURL(url);

        }

        function downloadCSV() {

            let savedData = JSON.parse(localStorage.getItem(localStorageKey)) || initialData;

            let csv = 'Tanggal,Nomor\n';

            savedData.forEach(item => {

                csv += `${item.date},${item.number}\n`;

            });

            const blob = new Blob([csv], { type: 'text/csv' });

            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');

            a.href = url;

            a.download = 'data_hk_2025.csv';

            a.click();

            URL.revokeObjectURL(url);

        }

        const audio = document.getElementById('musicPlayer');

        const status = document.getElementById('playerStatus');

        function playMusic() { audio.play(); status.textContent = 'Playing ♪'; }

        function pauseMusic() { audio.pause(); status.textContent = 'Paused'; }

        function stopMusic() { audio.pause(); audio.currentTime = 0; status.textContent = 'Stopped'; }

        audio.addEventListener('ended', () => { status.textContent = 'Stopped'; });

        window.onload = function() {

            initializeData();

        };

    </script>
