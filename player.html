<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekhim's MP3 Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto+Mono:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0a1f 0%, #000000 100%);
            color: #00f5ff;
            font-family: 'Roboto Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player {
            width: 420px;
            background: rgba(10, 10, 30, 0.95);
            border: 2px solid #00f5ff;
            border-radius: 20px;
            box-shadow: 
                0 0 40px rgba(0, 245, 255, 0.6),
                inset 0 0 30px rgba(0, 245, 255, 0.2);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            color: #000;
            padding: 15px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            letter-spacing: 2px;
        }

        .visualizer {
            height: 180px;
            background: linear-gradient(black, #1a0033);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #00f5ff;
        }

        .visualizer::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0,245,255,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .album-art {
            width: 120px;
            height: 120px;
            background: url('https://picsum.photos/300/300?random=42') center/cover;
            border: 3px solid #00f5ff;
            border-radius: 50%;
            box-shadow: 0 0 30px #ff00ff,
                        inset 0 0 20px rgba(255,255,255,0.3);
            z-index: 2;
            animation: rotate 20s linear infinite paused;
        }

        .playing .album-art {
            animation-play-state: running;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .info {
            padding: 15px 20px;
            text-align: center;
            background: rgba(0,0,0,0.4);
        }

        .title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .artist {
            font-size: 0.9rem;
            color: #00f5ff88;
        }

        .controls {
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .progress-container {
            position: relative;
        }

        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            box-shadow: 0 0 10px #00f5ff;
            transition: width 0.1s linear;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 4px;
            color: #00f5ff99;
        }

        .buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid #00f5ff;
            color: #00f5ff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
        }

        .btn:hover {
            background: #00f5ff;
            color: #000;
            transform: scale(1.1);
        }

        .btn-play {
            width: 70px;
            height: 70px;
            font-size: 1.8rem;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            color: #000;
            border: none;
        }

        .volume {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .volume-level {
            height: 100%;
            width: 70%;
            background: #00f5ff;
        }

        .playlist {
            max-height: 280px;
            overflow-y: auto;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid #00f5ff33;
        }

        .playlist-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #ffffff11;
        }

        .playlist-item:hover,
        .playlist-item.active {
            background: rgba(0, 245, 255, 0.15);
            padding-left: 25px;
        }

        .playlist-item .number {
            width: 24px;
            color: #00f5ff77;
            font-size: 0.8rem;
        }

        .playlist-item .song-info {
            flex: 1;
        }

        .playlist-item .song-title {
            font-size: 0.95rem;
        }

        .playlist-item .song-artist {
            font-size: 0.75rem;
            color: #00f5ff88;
        }

        .footer {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: #00f5ff55;
            background: #000;
        }

        /* Scrollbar futuristic */
        .playlist::-webkit-scrollbar {
            width: 6px;
        }
        .playlist::-webkit-scrollbar-thumb {
            background: #00f5ff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="player" id="player">
        <div class="header">TEK HIM'S MP3 PLAYER</div>
        
        <div class="visualizer" id="visualizer">
            <div class="album-art" id="albumArt"></div>
        </div>

        <div class="info">
            <div class="title" id="currentTitle">Pilih lagu dari playlist</div>
            <div class="artist" id="currentArtist">Tekhim Collection</div>
        </div>

        <div class="controls">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="time">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="buttons">
                <div class="btn" id="shuffleBtn">🔀</div>
                <div class="btn" id="prevBtn">⏮</div>
                <div class="btn btn-play" id="playBtn">▶</div>
                <div class="btn" id="nextBtn">⏭</div>
                <div class="btn" id="repeatBtn">🔁</div>
            </div>

            <div class="volume">
                <span>🔊</span>
                <div class="volume-bar" id="volumeBar">
                    <div class="volume-level" id="volumeLevel"></div>
                </div>
            </div>
        </div>

        <div class="playlist" id="playlist"></div>

        <div class="footer">
            v1.0 • Futuristic Edition
        </div>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const albumArt = document.getElementById('albumArt');
        const playlistEl = document.getElementById('playlist');
        const player = document.getElementById('player');
        const volumeBar = document.getElementById('volumeBar');
        const volumeLevel = document.getElementById('volumeLevel');

        // Koleksi lagu contoh (ganti dengan link MP3 kamu)
        let playlist = [
            {
                title: "Qing Ren De Yen Lei",
                artist: "Neon Waves",
                src: "qingren.mp3",
                cover: "https://picsum.photos/300/300?random=1"
            },
            {
                title: "Cyber City",
                artist: "Tekhim",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                cover: "https://picsum.photos/300/300?random=2"
            },
            {
                title: "Stellar Drift",
                artist: "Quantum Pulse",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                cover: "https://picsum.photos/300/300?random=3"
            },
            {
                title: "Eclipse",
                artist: "Void Collective",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                cover: "https://picsum.photos/300/300?random=4"
            }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0 = off, 1 = repeat all, 2 = repeat one

        function loadSong(index) {
            if (index < 0 || index >= playlist.length) return;
            
            currentIndex = index;
            const song = playlist[index];
            
            audio.src = song.src;
            currentTitle.textContent = song.title;
            currentArtist.textContent = song.artist;
            albumArt.style.backgroundImage = `url('${song.cover}')`;
            
            // Highlight active song
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            audio.load();
            if (isPlaying) audio.play();
        }

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.innerHTML = `
                    <div class="number">${index + 1}</div>
                    <div class="song-info">
                        <div class="song-title">${song.title}</div>
                        <div class="song-artist">${song.artist}</div>
                    </div>
                `;
                item.onclick = () => {
                    loadSong(index);
                };
                playlistEl.appendChild(item);
            });
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                isPlaying = true;
                playBtn.innerHTML = '⏸';
                player.classList.add('playing');
            } else {
                audio.pause();
                isPlaying = false;
                playBtn.innerHTML = '▶';
                player.classList.remove('playing');
            }
        }

        // Event listeners
        playBtn.addEventListener('click', togglePlay);

        nextBtn.addEventListener('click', () => {
            let next = currentIndex + 1;
            if (next >= playlist.length) next = 0;
            loadSong(next);
        });

        prevBtn.addEventListener('click', () => {
            let prev = currentIndex - 1;
            if (prev < 0) prev = playlist.length - 1;
            loadSong(prev);
        });

        // Progress bar
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = `${progressPercent}%`;
                
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
            }
        });

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });

        // Volume
        volumeBar.addEventListener('click', (e) => {
            const rect = volumeBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.volume = Math.max(0, Math.min(1, pos));
            volumeLevel.style.width = `${audio.volume * 100}%`;
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowRight') {
                audio.currentTime += 5;
            }
            if (e.code === 'ArrowLeft') {
                audio.currentTime -= 5;
            }
        });

        // Auto next
        audio.addEventListener('ended', () => {
            if (repeatMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else {
                let next = currentIndex + 1;
                if (next >= playlist.length) {
                    if (repeatMode === 1) next = 0;
                    else return;
                }
                loadSong(next);
            }
        });

        // Initialize
        renderPlaylist();
        loadSong(0);
        audio.volume = 0.7;
        volumeLevel.style.width = '70%';

        // Tambahkan lagu baru dengan mudah:
        // playlist.push({ title: "Judul", artist: "Artis", src: "link.mp3", cover: "link.jpg" });
        // renderPlaylist();
    </script>
</body>
</html>
