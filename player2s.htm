<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tekhim's Mp3 Player</title>
  <!-- Font Awesome untuk ikon futuristik -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 20%, #0b0f1e, #02040a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      padding: 16px;
      margin: 0;
    }

    /* Kulit player futuristik */
    .player {
      width: 100%;
      max-width: 400px;
      background: rgba(12, 20, 35, 0.75);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-radius: 48px;
      padding: 24px 20px 30px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 255, 0.25), 0 0 25px rgba(0, 180, 255, 0.5);
      border: 1px solid rgba(0, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: all 0.2s ease;
    }

    /* Header dengan nama player */
    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #b7f0ff;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 0 6px;
    }

    .player-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a0f0ff, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 12px #00a6ff;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .player-title i {
      background: none;
      -webkit-text-fill-color: #4df0ff;
      text-shadow: 0 0 15px cyan;
      font-size: 1.8rem;
    }

    .badge {
      background: rgba(0, 255, 255, 0.15);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #9ee6ff;
      border: 1px solid rgba(0, 255, 255, 0.4);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Area cover art + efek visual */
    .cover-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 5px 0 10px;
    }

    .cover-art {
      width: 180px;
      height: 180px;
      border-radius: 30px;
      background: linear-gradient(145deg, #101c34, #030617);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 160, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      color: rgba(0, 255, 255, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.5);
      transition: 0.3s;
      background-size: cover;
      background-position: center;
      position: relative;
      z-index: 2;
    }

    /* Lingkaran dekoratif futuristik */
    .cover-container::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #00ffff, #006eff, #b200ff, #00ffff);
      opacity: 0.3;
      filter: blur(25px);
      z-index: 1;
      animation: rotateGlow 8s infinite linear;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Info lagu */
    .song-info {
      text-align: center;
      margin-top: 5px;
    }

    .song-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6f7ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      text-shadow: 0 0 8px #0099ff;
    }

    .song-artist {
      font-size: 0.9rem;
      color: #9bb8da;
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* Slider progress */
    .progress-area {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bfe4ff;
      font-size: 0.75rem;
      margin: 5px 0;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00e0ff, #0080ff);
      border-radius: 10px;
      position: relative;
      box-shadow: 0 0 12px #00a6ff;
    }

    /* Tombol kontrol utama */
    .controls {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin: 5px 0 10px;
    }

    .ctrl-btn {
      background: rgba(20, 30, 50, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.35);
      color: #c2edff;
      font-size: 1.4rem;
      width: 50px;
      height: 50px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,0.6);
      background: radial-gradient(circle at 30% 30%, rgba(0,255,200,0.15), transparent 70%);
    }

    .ctrl-btn:active {
      transform: scale(0.92);
      background: rgba(0, 180, 255, 0.3);
      box-shadow: 0 0 20px cyan;
    }

    .play-btn {
      width: 65px;
      height: 65px;
      font-size: 1.9rem;
      background: linear-gradient(135deg, #003b5c, #001d33);
      border: 2px solid #00e0ff;
      box-shadow: 0 0 25px #0077ff;
    }

    /* Tombol percepat sentuh (speed) */
    .speed-control {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: rgba(0, 20, 40, 0.6);
      backdrop-filter: blur(14px);
      border-radius: 40px;
      padding: 8px 18px;
      margin: 5px 0;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .speed-btn {
      background: transparent;
      border: none;
      color: #7fd6ff;
      font-size: 1.1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      background: rgba(255,255,255,0.05);
      transition: 0.2s;
      border: 1px solid rgba(0, 255, 255, 0.4);
    }

    .speed-btn:active {
      background: #00b7ff33;
      color: white;
      box-shadow: 0 0 18px cyan;
    }

    .speed-value {
      font-weight: 700;
      font-size: 1.2rem;
      color: #00f2ff;
      min-width: 50px;
      text-align: center;
      text-shadow: 0 0 10px cyan;
    }

    /* Daftar putar */
    .playlist-container {
      max-height: 160px;
      overflow-y: auto;
      background: rgba(0, 5, 19, 0.5);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 8px 6px;
      border: 1px solid rgba(0, 255, 255, 0.25);
    }

    .playlist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      margin: 3px 0;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      color: #cbe9ff;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .playlist-item.active {
      background: rgba(0, 180, 255, 0.25);
      border: 1px solid #00e0ff;
      box-shadow: 0 0 15px #0055ff;
    }

    .playlist-item i {
      color: #4df0ff;
      margin-right: 8px;
    }

    .playlist-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Scrollbar estetik */
    .playlist-container::-webkit-scrollbar {
      width: 4px;
    }
    .playlist-container::-webkit-scrollbar-thumb {
      background: #00ccff;
      border-radius: 10px;
    }

    @media (max-width: 400px) {
      .player {
        padding: 20px 15px 25px;
      }
      .cover-art {
        width: 150px;
        height: 150px;
        font-size: 4rem;
      }
    }
  </style>
</head>
<body>
  <div class="player">
    <!-- Header -->
    <div class="player-header">
      <div class="player-title">
        <i class="fas fa-headphones"></i> Tekhim's Mp3
      </div>
      <div class="badge">
        <i class="fas fa-compact-disc"></i> FUTURISTIC
      </div>
    </div>

    <!-- Cover Art -->
    <div class="cover-container">
      <div class="cover-art" id="coverArt">
        <i class="fas fa-music"></i>
      </div>
    </div>

    <!-- Info lagu -->
    <div class="song-info">
      <div class="song-title" id="songTitle">Pilih Lagu</div>
      <div class="song-artist" id="songArtist">Tekhim's Collection</div>
    </div>

    <!-- Progress bar -->
    <div class="progress-area">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBarContainer">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
      </div>
      <span id="durationTime">0:00</span>
    </div>

    <!-- Tombol kontrol -->
    <div class="controls">
      <div class="ctrl-btn" id="prevBtn"><i class="fas fa-backward"></i></div>
      <div class="ctrl-btn play-btn" id="playBtn"><i class="fas fa-play"></i></div>
      <div class="ctrl-btn" id="nextBtn"><i class="fas fa-forward"></i></div>
    </div>

    <!-- Kontrol kecepatan sentuh -->
    <div class="speed-control">
      <button class="speed-btn" id="speedDown"><i class="fas fa-minus"></i></button>
      <span class="speed-value" id="speedDisplay">1.0x</span>
      <button class="speed-btn" id="speedUp"><i class="fas fa-plus"></i></button>
      <button class="speed-btn" id="resetSpeed"><i class="fas fa-undo-alt"></i></button>
    </div>

    <!-- Daftar putar / koleksi lagu -->
    <div class="playlist-container" id="playlistContainer">
      <!-- diisi melalui JavaScript -->
    </div>
  </div>

  <script>
    (function() {
      // ----------------------------------------------
      // EDIT BAGIAN INI UNTUK MENAMBAH LAGU KAMU
      // Format: { title: "Judul Lagu", artist: "Artis", src: "url/file.mp3", cover: "url_gambar_opsional" }
      // Gunakan file audio lokal atau remote (pastikan CORS aman)
      // ----------------------------------------------
      const playlist = [
        {
          title: "Qing Ren De Yen Lei",
          artist: "Tekhim",
          src: "qingren.mp3",
          cover: "https://images.unsplash.com/photo-1614149162883-504ce4d13909?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Neon Pulse",
          artist: "CyberTek",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
          cover: "https://images.unsplash.com/photo-1550684376-efcbd6e3f031?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Digital Horizon",
          artist: "Tekhim",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
          cover: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop&auto=format"
        },
        {
          title: "Galactic Echo",
          artist: "AstroTek",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
          cover: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=300&h=300&fit=crop&auto=format"
        }
      ];

      // Elemen DOM
      const audio = new Audio();
      let currentIndex = 0;
      let isPlaying = false;
      let playbackSpeed = 1.0;

      const coverArt = document.getElementById('coverArt');
      const songTitle = document.getElementById('songTitle');
      const songArtist = document.getElementById('songArtist');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const progressBarContainer = document.getElementById('progressBarContainer');
      const progressFill = document.getElementById('progressFill');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationTimeSpan = document.getElementById('durationTime');
      const speedDisplay = document.getElementById('speedDisplay');
      const speedUp = document.getElementById('speedUp');
      const speedDown = document.getElementById('speedDown');
      const resetSpeed = document.getElementById('resetSpeed');
      const playlistContainer = document.getElementById('playlistContainer');

      // Format waktu
      function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      }

      // Muat lagu berdasarkan index
      function loadSong(index) {
        if (index < 0 || index >= playlist.length) return;
        currentIndex = index;
        const song = playlist[index];
        
        audio.src = song.src;
        audio.playbackRate = playbackSpeed;
        
        songTitle.textContent = song.title;
        songArtist.textContent = song.artist;
        
        // Cover image atau fallback icon
        if (song.cover && song.cover.trim() !== "") {
          coverArt.style.backgroundImage = `url('${song.cover}')`;
          coverArt.innerHTML = ''; // hapus ikon
        } else {
          coverArt.style.backgroundImage = '';
          coverArt.innerHTML = '<i class="fas fa-music"></i>';
        }
        
        // Update playlist active
        updatePlaylistActive();
        
        // Reset progress
        progressFill.style.width = '0%';
        currentTimeSpan.textContent = '0:00';
        durationTimeSpan.textContent = '0:00';
        
        if (isPlaying) {
          audio.play().catch(e => console.log("Play prevented:", e));
        }
      }

      // Putar / pause
      function togglePlay() {
        if (!playlist.length) return;
        if (isPlaying) {
          audio.pause();
        } else {
          audio.play().catch(e => console.log("Play error:", e));
        }
        isPlaying = !isPlaying;
        updatePlayButton();
      }

      function updatePlayButton() {
        playBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      }

      // Lagu sebelumnya / berikutnya
      function prevSong() {
        if (playlist.length === 0) return;
        currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        loadSong(currentIndex);
        if (isPlaying) {
          audio.play().catch(()=>{});
        }
      }

      function nextSong() {
        if (playlist.length === 0) return;
        currentIndex = (currentIndex + 1) % playlist.length;
        loadSong(currentIndex);
        if (isPlaying) {
          audio.play().catch(()=>{});
        }
      }

      // Update progress bar
      function updateProgress() {
        if (audio.duration) {
          const progressPercent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = `${progressPercent}%`;
          currentTimeSpan.textContent = formatTime(audio.currentTime);
          durationTimeSpan.textContent = formatTime(audio.duration);
        }
      }

      // Set progress dari sentuhan/klik
      function setProgress(e) {
        const width = progressBarContainer.clientWidth;
        const clickX = e.offsetX;
        if (audio.duration && width) {
          const seekTime = (clickX / width) * audio.duration;
          audio.currentTime = seekTime;
        }
      }

      // Update kecepatan
      function setSpeed(val) {
        playbackSpeed = Math.min(2.5, Math.max(0.5, val));
        audio.playbackRate = playbackSpeed;
        speedDisplay.textContent = playbackSpeed.toFixed(1) + 'x';
      }

      // Render playlist
      function renderPlaylist() {
        playlistContainer.innerHTML = '';
        playlist.forEach((song, idx) => {
          const item = document.createElement('div');
          item.className = `playlist-item ${idx === currentIndex ? 'active' : ''}`;
          item.innerHTML = `
            <i class="fas fa-music"></i>
            <span class="playlist-title">${song.title} - ${song.artist}</span>
            <i class="fas fa-play-circle" style="opacity:0.7;"></i>
          `;
          item.addEventListener('click', () => {
            if (idx === currentIndex && isPlaying) {
              // jika klik lagu yang sama, toggle play/pause
              togglePlay();
            } else {
              currentIndex = idx;
              loadSong(currentIndex);
              isPlaying = true;
              audio.play().catch(()=>{});
              updatePlayButton();
            }
          });
          playlistContainer.appendChild(item);
        });
      }

      function updatePlaylistActive() {
        const items = document.querySelectorAll('.playlist-item');
        items.forEach((item, idx) => {
          if (idx === currentIndex) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });
      }

      // Event listener
      playBtn.addEventListener('click', togglePlay);
      prevBtn.addEventListener('click', prevSong);
      nextBtn.addEventListener('click', nextSong);
      
      progressBarContainer.addEventListener('click', setProgress);
      
      audio.addEventListener('timeupdate', updateProgress);
      audio.addEventListener('loadedmetadata', () => {
        durationTimeSpan.textContent = formatTime(audio.duration);
      });
      audio.addEventListener('ended', () => {
        // Otomatis lanjut ke lagu berikutnya
        nextSong();
        if (isPlaying) {
          audio.play().catch(()=>{});
        }
      });
      
      // Kontrol kecepatan
      speedUp.addEventListener('click', () => {
        setSpeed(playbackSpeed + 0.25);
      });
      speedDown.addEventListener('click', () => {
        setSpeed(playbackSpeed - 0.25);
      });
      resetSpeed.addEventListener('click', () => {
        setSpeed(1.0);
      });

      // Sentuh / klik ganda untuk percepat (opsional, sudah ada tombol)
      // Tapi sesuai permintaan: lagu bisa dipercepat dengan sentuhan -> sudah tersedia di speed control.

      // Inisialisasi
      renderPlaylist();
      if (playlist.length > 0) {
        loadSong(0);
      } else {
        songTitle.textContent = "Tidak ada lagu";
        songArtist.textContent = "Tambahkan di playlist array";
      }
      
      // Pastikan tampilan tombol play sesuai
      updatePlayButton();
      audio.playbackRate = playbackSpeed;
    })();
  </script>
</body>
  </html>
